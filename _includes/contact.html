<section class="contact" id="contact">
  <div class="contact__map">
    <iframe src="{{ site.data.contact_section.map_embed_url }}" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
  </div>

  <div class="container contact__form-wrap">
    <h2 class="section-title">{{ site.data.contact_section.title }}</h2>
    <form class="contact__form" action="{{ site.data.contact_section.form_action }}" method="POST">
      <input type="text" name="full_name" placeholder="الاسم كاملاً" required>
      <input type="tel" name="phone" placeholder="رقم الهاتف" required>
      <input type="email" name="email" placeholder="البريد الإلكتروني" required>
      <input type="text" name="subject" placeholder="عنوان الرسالة" required>
      <textarea name="message" rows="5" placeholder="الرسالة" required></textarea>
      <label class="contact__captcha">
        {{ site.data.contact_section.captcha_question }}
        <input type="text" name="captcha" required>
      </label>
      <button type="submit" class="btn btn--solid">{{ site.data.contact_section.submit_button_text }}</button>
    </form>
  </div>

  <div class="container contact__info-grid">
    {% for item in site.data.contact_section.contact_info %}
    <div class="contact__info-item">
      <span class="contact__info-icon">
        <img src="{{ item.icon | relative_url }}" alt="">
      </span>
      <div>
        <strong>{{ item.label }}</strong>
        <span>{{ item.value }}</span>
      </div>
    </div>
    {% endfor %}
  </div>
</section>
