<section class="prize" id="prize" style="background-image: url('{{ site.data.prize_section.banner_image | relative_url }}');">
  <div class="prize__overlay"></div>
  <div class="container prize__banner">
    <img src="{{ site.data.prize_section.emblem_image | relative_url }}" alt="" class="prize__emblem">
    <h2>{{ site.data.prize_section.title }}</h2>
    <h3>{{ site.data.prize_section.about_title }}</h3>
    <p>{{ site.data.prize_section.about_text }}</p>
  </div>
</section>
