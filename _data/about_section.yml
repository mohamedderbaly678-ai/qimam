sections:
  - icon: /assets/images/icon-question.svg
    title: "من نحن"
    text: >
      مؤسسة تعليمية قرآنية تأسست لخدمة كتاب الله عز وجل، وتقديم برامج تحفيظ وتجويد
      وفق منهجية علمية واضحة.
  - icon: /assets/images/icon-lightbulb.svg
    title: "الفكرة"
    text: >
      نشأت الفكرة من واقع الحاجة الملحّة لبرامج قرآنية متخصصة تجمع بين الإتقان والانضباط.
  - icon: /assets/images/icon-eye.svg
    title: "الرؤية والأهداف"
    text: >
      أن نكون منارة تعليمية قرآنية رائدة، تخرّج أجيالاً متقنة لكتاب الله، عاملة بسنة نبيه.
  - icon: /assets/images/icon-house.svg
    title: "البداية والتأسيس"
    text: >
      انطلقت المؤسسة بجهود تطوعية محدودة، ثم تطورت لتشمل برامج ومشاريع متعددة.
  - icon: /assets/images/icon-chart-layers.svg
    title: "التطور"
    text: >
      شهدت المؤسسة توسعاً ملحوظاً في عدد الطلاب والمعلمين والبرامج المقدّمة عاماً بعد عام.
  - icon: /assets/images/icon-mic.svg
    title: "قناة قِمَم الأندلس"
    text: >
      منصة إذاعية مكملة لرسالة المؤسسة، تنقل محتوى قرآنياً وتربوياً لجمهور أوسع.
