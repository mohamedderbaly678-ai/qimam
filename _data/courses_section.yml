hero_image: /assets/images/courses-hero-placeholder.jpg
title: "دورات قِمَم الأندلس"
intro_text: >
  تقدم المؤسسة عدداً من الدورات القرآنية المتخصصة التي تجمع بين علم التجويد والقراءات
  ورسم المصحف العثماني، بإشراف مشايخ متخصصين وأسانيد متصلة.

course_1:
  title: "دورة فنون رواية الإمام قالون"
  syllabus:
    - "أصول رواية الإمام قالون عن نافع"
    - "أحكام التجويد الخاصة بالرواية"
    - "التطبيق العملي على الأجزاء المقررة"
    - "الإجازة بالسند المتصل"
  timeline:
    - label: "التسجيل"
      text: "فتح باب التسجيل الإلكتروني."
    - label: "الامتحان"
      text: "اختبار تحريري وشفوي للمستوى."
    - label: "النتائج"
      text: "الإعلان عن نتائج المتقدمين."
    - label: "الحفل"
      text: "حفل تكريم الناجحين وتسليم الشهادات."

course_2:
  title: "دورة الرسم العثماني للمصحف"
  syllabus:
    - "مبادئ الرسم العثماني وتاريخه"
    - "الفروق بين الرسم العثماني والإملائي"
    - "تدريبات عملية على النسخ"
    - "الإجازة في الرسم العثماني"
  timeline:
    - label: "التسجيل"
      text: "فتح باب التسجيل الإلكتروني."
    - label: "الامتحان"
      text: "اختبار تحريري وشفوي للمستوى."
    - label: "النتائج"
      text: "الإعلان عن نتائج المتقدمين."
    - label: "الحفل"
      text: "حفل تكريم الناجحين وتسليم الشهادات."

women_courses:
  title: "دورات النساء"
  intro_text: >
    قسم خاص بدورات النساء، بنفس الجودة والمنهجية، بإشراف معلمات متخصصات.
