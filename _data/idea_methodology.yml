idea:
  icon: /assets/images/icon-lightbulb.svg
  title: "فكرة المشروع"
  text: >
    تنطلق فكرة المشروع من الحاجة إلى تأسيس جيلٍ متمسكٍ بكتاب الله وسنة نبيه صلى الله عليه وسلم،
    من خلال برامج تعليمية قرآنية متخصصة تجمع بين الأصالة والمنهجية الحديثة في التحفيظ والتجويد.
methodology:
  icon: /assets/images/icon-speech-bubbles.svg
  title: "طريقة التخطيط"
  text: >
    تعتمد المؤسسة خطة عمل مرحلية تبدأ بتحديد الأهداف السنوية، مروراً باختيار الكوادر التعليمية المؤهلة،
    وصولاً إلى متابعة الأثر التربوي والتعليمي لكل برنامج يُطرح.
