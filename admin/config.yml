backend:
  name: github
  repo: your-username/your-repo-name   # TODO: replace with your GitHub "owner/repo"
  branch: main
  base_url: https://api.netlify.com    # free shared OAuth proxy, works without hosting on Netlify
  auth_endpoint: auth

# If you would rather test locally without GitHub auth, run `npx decap-server`
# and uncomment the line below (and comment out the `backend` block above).
# local_backend: true

publish_mode: editorial_workflow
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

locale: "ar"

site_url: https://your-username.github.io/your-repo-name
display_url: https://your-username.github.io/your-repo-name

collections:

  # ==========================================================
  # 1. Singleton page sections — one editable file per section
  # ==========================================================
  - name: "sections"
    label: "أقسام الصفحة الرئيسية"
    files:

      - name: "nav"
        label: "شريط التنقل (Navbar)"
        file: "_data/nav.yml"
        fields:
          - { label: "نص الشعار", name: "logo_text", widget: "string" }
          - { label: "صورة الشعار", name: "logo_image", widget: "image" }
          - label: "روابط القائمة"
            name: "links"
            widget: "list"
            fields:
              - { label: "النص", name: "label", widget: "string" }
              - { label: "الرابط", name: "url", widget: "string" }

      - name: "hero"
        label: "إعدادات الواجهة الرئيسية (Hero)"
        file: "_data/hero.yml"
        fields:
          - { label: "نص الزر", name: "button_text", widget: "string" }
          - { label: "رابط الزر", name: "button_url", widget: "string" }
          - { label: "صورة احتياطية (إن لم توجد أخبار)", name: "fallback_image", widget: "image" }
          - { label: "عنوان احتياطي", name: "fallback_title", widget: "string" }
          - { label: "نص فرعي احتياطي", name: "fallback_subtitle", widget: "text" }

      - name: "stats"
        label: "شريط الإحصائيات"
        file: "_data/stats.yml"
        fields:
          - label: "الإحصائيات"
            name: "items"
            widget: "list"
            fields:
              - { label: "أيقونة", name: "icon", widget: "image" }
              - { label: "الرقم", name: "number", widget: "number", value_type: "int" }
              - { label: "الوصف", name: "label", widget: "string" }

      - name: "projects_section"
        label: "قسم المشاريع (الخلفية والعنوان فقط)"
        file: "_data/projects_section.yml"
        fields:
          - { label: "صورة الخلفية", name: "background_image", widget: "image" }
          - { label: "العنوان", name: "title", widget: "string" }

      - name: "prize_section"
        label: "قسم جائزة قِمَم"
        file: "_data/prize_section.yml"
        fields:
          - { label: "صورة البانر", name: "banner_image", widget: "image" }
          - { label: "شعار الجائزة", name: "emblem_image", widget: "image" }
          - { label: "عنوان الجائزة", name: "title", widget: "string" }
          - { label: "عنوان النبذة", name: "about_title", widget: "string" }
          - { label: "نص النبذة", name: "about_text", widget: "text" }
          - label: "الجوائز"
            name: "prizes"
            widget: "list"
            fields:
              - { label: "المركز", name: "place", widget: "string" }
              - { label: "أيقونة", name: "icon", widget: "image" }
              - { label: "قيمة الجائزة", name: "reward", widget: "string" }
          - label: "إحصائيات الفائزين السابقين"
            name: "previous_winners_stats"
            widget: "list"
            fields:
              - { label: "أيقونة", name: "icon", widget: "image" }
              - { label: "الرقم", name: "number", widget: "number", value_type: "int" }
              - { label: "الوصف", name: "label", widget: "string" }
          - label: "خطوات التسجيل"
            name: "registration_steps"
            widget: "list"
            fields:
              - { label: "أيقونة", name: "icon", widget: "image" }
              - { label: "العنوان", name: "title", widget: "string" }
              - { label: "النص", name: "text", widget: "text" }

      - name: "radio_section"
        label: "قسم الإذاعة"
        file: "_data/radio_section.yml"
        fields:
          - { label: "رسم توضيحي للراديو", name: "radio_illustration", widget: "image" }
          - { label: "نص التردد", name: "frequency_text", widget: "string" }
          - { label: "نص زر التشغيل", name: "play_button_text", widget: "string" }
          - { label: "رابط زر التشغيل", name: "play_button_url", widget: "string", hint: "اتركه # مؤقتًا؛ سيتم توفير رابط البث المباشر الفعلي لاحقًا وقتها فقط ضعه هنا" }
          - { label: "العنوان", name: "title", widget: "string" }
          - { label: "الوصف", name: "description", widget: "text" }
          - { label: "نص زر قائمة البرامج", name: "programs_list_button_text", widget: "string" }
          - { label: "رابط زر قائمة البرامج", name: "programs_list_button_url", widget: "string" }
          - label: "مشغل البث المباشر"
            name: "player"
            widget: "object"
            fields:
              - { label: "صورة الغلاف", name: "album_art", widget: "image" }
              - { label: "عنوان المقطع", name: "track_title", widget: "string" }
              - { label: "الوقت المنقضي", name: "elapsed_time", widget: "string" }
          - label: "جدول البرامج"
            name: "schedule"
            widget: "list"
            fields:
              - { label: "البرنامج", name: "program", widget: "string" }
              - { label: "التوقيت", name: "time", widget: "string" }
              - { label: "المدة الزمنية", name: "duration", widget: "string" }

      - name: "about_section"
        label: "قسم عن المؤسسة"
        file: "_data/about_section.yml"
        fields:
          - label: "الأقسام"
            name: "sections"
            widget: "list"
            fields:
              - { label: "أيقونة", name: "icon", widget: "image" }
              - { label: "العنوان", name: "title", widget: "string" }
              - { label: "النص", name: "text", widget: "text" }

      - name: "footer"
        label: "التذييل (Footer)"
        file: "_data/footer.yml"
        fields:
          - { label: "الشعار", name: "logo_image", widget: "image" }
          - { label: "عنوان التواصل الاجتماعي", name: "social_title", widget: "string" }
          - label: "روابط التواصل الاجتماعي"
            name: "social_links"
            widget: "list"
            fields:
              - { label: "المنصة", name: "platform", widget: "string" }
              - { label: "أيقونة", name: "icon", widget: "image" }
              - { label: "الرابط", name: "url", widget: "string" }
          - label: "معلومات التواصل"
            name: "contact_info"
            widget: "list"
            fields:
              - { label: "أيقونة", name: "icon", widget: "image" }
              - { label: "التسمية", name: "label", widget: "string" }
              - { label: "القيمة", name: "value", widget: "string" }
          - { label: "عنوان الموقع (للخريطة)", name: "map_address", widget: "string", hint: "يُستخدم لتحديد الموقع على الخريطة إن لم يتم إدخال إحداثيات دقيقة أدناه" }
          - { label: "خط العرض (اختياري، لدقة أعلى)", name: "map_latitude", widget: "number", value_type: "float", required: false }
          - { label: "خط الطول (اختياري، لدقة أعلى)", name: "map_longitude", widget: "number", value_type: "float", required: false }
          - { label: "نص حقوق النشر", name: "copyright_text", widget: "string" }
          - { label: "اعتماد المطوّر", name: "developer_credit", widget: "string" }

      - name: "misc_titles"
        label: "عناوين متفرقة"
        file: "_data/misc_titles.yml"
        fields:
          - { label: "عنوان قسم المشاركين", name: "participants_section_title", widget: "string" }
          - { label: "عنوان معرض الصور", name: "gallery_section_title", widget: "string" }
          - { label: "عنوان معرض الفيديو", name: "video_gallery_section_title", widget: "string" }
          - { label: "عنوان قسم المشايخ", name: "teachers_section_title", widget: "string" }
          - { label: "عنوان قسم النتائج", name: "results_section_title", widget: "string" }
          - { label: "عنوان فرعي للنتائج", name: "results_section_subtitle", widget: "string" }
          - { label: "عنوان الدورات المنفذة", name: "executed_courses_title", widget: "string" }
          - { label: "عنوان آراء العملاء", name: "testimonials_title", widget: "string" }

      - name: "courses_page"
        label: "صفحة الدورات — الواجهة والمقدمة"
        file: "_data/courses_page.yml"
        fields:
          - { label: "صورة الواجهة", name: "hero_image", widget: "image" }
          - { label: "عنوان الواجهة", name: "hero_title", widget: "string" }
          - { label: "عنوان المقدمة", name: "intro_title", widget: "string" }
          - { label: "نص المقدمة", name: "intro_text", widget: "text" }

      - name: "course_meta_icons"
        label: "صفحة الدورات — أيقونات موحدة (المدة، الشهادة، الفئة، الساعات)"
        file: "_data/course_meta_icons.yml"
        fields:
          - { label: "أيقونة المدة", name: "duration_icon", widget: "image" }
          - { label: "أيقونة الشهادة", name: "certificate_icon", widget: "image" }
          - { label: "أيقونة الفئة التدريبية", name: "category_icon", widget: "image" }
          - { label: "أيقونة عدد الساعات", name: "hours_icon", widget: "image" }

      - name: "course_system"
        label: "صفحة الدورات — نظام الدورات (القسم الملوّن)"
        file: "_data/course_system.yml"
        fields:
          - { label: "لون القسم", name: "theme_color", widget: "color" }
          - { label: "العنوان", name: "title", widget: "string" }
          - label: "البطاقات"
            name: "cards"
            widget: "list"
            fields:
              - { label: "أيقونة", name: "icon", widget: "image" }
              - { label: "العنوان", name: "title", widget: "string" }
              - { label: "النص", name: "text", widget: "text" }

      - name: "courses_stats_section"
        label: "صفحة الدورات — شريط الإحصائيات"
        file: "_data/courses_stats_section.yml"
        fields:
          - { label: "صورة الخلفية", name: "background_image", widget: "image" }
          - label: "الإحصائيات"
            name: "items"
            widget: "list"
            fields:
              - { label: "أيقونة", name: "icon", widget: "image" }
              - { label: "الرقم", name: "number", widget: "number", value_type: "int" }
              - { label: "الوصف", name: "label", widget: "string" }

  # ==========================================================
  # 2. Repeatable content — add/remove/reorder entries freely
  # ==========================================================
  - name: "course_blocks"
    label: "الدورات (الوصف التفصيلي)"
    folder: "_course_blocks"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "عنوان الدورة", name: "title", widget: "string" }
      - label: "الفئة"
        name: "audience"
        widget: "select"
        options: ["رجال", "نساء"]
      - { label: "وصف الدورة", name: "body", widget: "markdown" }
      - label: "محاور الدورة"
        name: "topics"
        widget: "list"
        field: { label: "محور", name: "item", widget: "string" }
      - { label: "تسمية المدة", name: "duration_label", widget: "string", default: "المدة" }
      - { label: "قيمة المدة", name: "duration_value", widget: "string" }
      - { label: "تسمية الشهادة", name: "certificate_label", widget: "string", default: "الشهادة" }
      - { label: "قيمة الشهادة", name: "certificate_value", widget: "string" }
      - { label: "تسمية الفئة التدريبية", name: "category_label", widget: "string", default: "الفئة التدريبية" }
      - { label: "قيمة الفئة التدريبية", name: "category_value", widget: "string" }
      - { label: "تسمية عدد الساعات", name: "hours_label", widget: "string", default: "عدد الساعات" }
      - { label: "قيمة عدد الساعات", name: "hours_value", widget: "string" }
      - { label: "ترتيب العرض", name: "order", widget: "number", value_type: "int", default: 1 }

  - name: "news"
    label: "الأخبار (شريط الواجهة الرئيسية)"
    folder: "_news"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "العنوان", name: "title", widget: "string" }
      - { label: "نص فرعي", name: "subtitle", widget: "string", required: false }
      - { label: "الصورة", name: "image", widget: "image" }
      - { label: "ترتيب العرض", name: "order", widget: "number", value_type: "int", default: 1 }

  - name: "projects_achieved"
    label: "المشاريع"
    folder: "_projects_achieved"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "اسم المشروع", name: "title", widget: "string" }
      - { label: "الرقم", name: "number", widget: "number", value_type: "int" }
      - { label: "صورة مصغرة", name: "thumbnail", widget: "image" }
      - { label: "أيقونة الفكرة", name: "idea_icon", widget: "image" }
      - { label: "نص الفكرة", name: "idea_text", widget: "string" }
      - { label: "أيقونة الطريقة", name: "method_icon", widget: "image" }
      - { label: "نص الطريقة", name: "method_text", widget: "string" }
      - { label: "ترتيب العرض", name: "order", widget: "number", value_type: "int", default: 1 }
      - { label: "وصف مختصر (اختياري)", name: "body", widget: "markdown", required: false }

  - name: "judges"
    label: "لجنة التحكيم"
    folder: "_judges"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "الاسم", name: "name", widget: "string" }
      - { label: "الصورة", name: "photo", widget: "image" }
      - { label: "ترتيب العرض", name: "order", widget: "number", value_type: "int", default: 1 }

  - name: "participants"
    label: "المشاركون في الجائزة"
    folder: "_participants"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "الاسم", name: "name", widget: "string" }
      - { label: "الصورة", name: "photo", widget: "image" }
      - { label: "ترتيب العرض", name: "order", widget: "number", value_type: "int", default: 1 }
      - label: "الدرجات"
        name: "scores"
        widget: "list"
        fields:
          - { label: "السورة", name: "surah", widget: "string" }
          - { label: "النسبة المئوية", name: "percentage", widget: "number", value_type: "int", min: 0, max: 100 }
          - { label: "اللون", name: "color", widget: "color" }

  - name: "gallery"
    label: "معرض صور الجائزة"
    folder: "_gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "الصورة", name: "image", widget: "image" }
      - { label: "الوصف", name: "caption", widget: "string" }
      - { label: "ترتيب العرض", name: "order", widget: "number", value_type: "int", default: 1 }
      - { label: "المجموعة", name: "gallery_group", widget: "string", default: "prize", required: false }

  - name: "courses_executed"
    label: "الدورات المميزة (أسفل صفحة الدورات)"
    folder: "_courses"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "عنوان الدورة", name: "title", widget: "string" }
      - { label: "الصورة (نسبة 16:9)", name: "photo", widget: "image" }
      - { label: "اسم المدرّس (اختياري)", name: "instructor", widget: "string", required: false }
      - { label: "رابط عند النقر (اختياري)", name: "url", widget: "string", required: false }
      - { label: "ترتيب العرض", name: "order", widget: "number", value_type: "int", default: 1 }

  - name: "teachers"
    label: "المشايخ / المعلمون"
    folder: "_teachers"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "الاسم", name: "name", widget: "string" }
      - { label: "صورة جماعية (خلفية الواجهة)", name: "group_photo", widget: "image" }
      - { label: "الصورة الشخصية الدائرية", name: "profile_photo", widget: "image" }
      - { label: "صورة كاملة", name: "full_body_photo", widget: "image" }
      - { label: "تاريخ الميلاد", name: "birthdate", widget: "string" }
      - { label: "سنة ختم القرآن", name: "quran_completion_year", widget: "number", value_type: "int" }
      - { label: "تفاصيل الحفظ", name: "memorization_details", widget: "text" }
      - { label: "صورة الفيديو المصغرة", name: "video_thumbnail", widget: "image" }
      - { label: "عنوان الفيديو", name: "video_title", widget: "string" }
      - { label: "رابط الفيديو", name: "video_url", widget: "string" }
      - { label: "ترتيب العرض", name: "order", widget: "number", value_type: "int", default: 1 }
      - label: "الخط الزمني"
        name: "timeline"
        widget: "list"
        fields:
          - { label: "أيقونة", name: "icon", widget: "image" }
          - { label: "العنوان", name: "title", widget: "string" }
          - { label: "النص", name: "text", widget: "text" }
      - { label: "نبذة إضافية", name: "body", widget: "markdown", required: false }

  - name: "programs"
    label: "برامج الإذاعة"
    folder: "_programs"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "العنوان", name: "title", widget: "string" }
      - { label: "الصورة المصغرة", name: "thumbnail", widget: "image" }
      - { label: "التاريخ", name: "date", widget: "datetime" }
      - { label: "عدد التعليقات", name: "comments_count", widget: "number", value_type: "int", default: 0 }
      - { label: "ترتيب العرض", name: "order", widget: "number", value_type: "int", default: 1 }

  - name: "results"
    label: "نتائج الجائزة"
    folder: "_results"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "الاسم", name: "name", widget: "string" }
      - { label: "الترتيب", name: "rank", widget: "number", value_type: "int" }
      - { label: "التقييم", name: "evaluation", widget: "string" }
      - { label: "الملاحظات", name: "notes", widget: "text", required: false }
      - { label: "ترتيب العرض", name: "order", widget: "number", value_type: "int", default: 1 }

  - name: "video_gallery"
    label: "معرض الفيديو"
    folder: "_video_gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "الصورة المصغرة", name: "thumbnail", widget: "image" }
      - { label: "رابط الفيديو", name: "video_url", widget: "string" }
      - { label: "العنوان", name: "title", widget: "string" }
      - { label: "ترتيب العرض", name: "order", widget: "number", value_type: "int", default: 1 }

  - name: "testimonials"
    label: "آراء العملاء"
    folder: "_testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "الاسم", name: "name", widget: "string" }
      - { label: "الصورة", name: "photo", widget: "image" }
      - { label: "الرأي", name: "quote", widget: "text" }
      - { label: "ترتيب العرض", name: "order", widget: "number", value_type: "int", default: 1 }
